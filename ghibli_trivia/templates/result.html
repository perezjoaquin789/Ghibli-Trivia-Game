<!DOCTYPE html>
<html>
<head>
    <title>Resultado</title>
</head>

<body style="font-family: Arial; background: linear-gradient(to right, #dfe9f3, #ffffff); text-align:center;">

    <div style="margin-top:80px;">

        <h1>Resultado final</h1>

        <p style="font-size:22px;">
            Tu puntaje fue: <strong>{{ puntaje }} / 10</strong>
        </p>

        {% if puntaje <= 4 %}
            <p style="color:red;">¿Viste aunque sea El Viaje de Chihiro...?</p>
        {% elif puntaje <= 7 %}
            <p style="color:orange;">¡Nada mal, fan casual!</p>
        {% else %}
            <p style="color:green;">¡Eres un maestro Ghibli!</p>
        {% endif %}

        <a href="/">
            <button style="
                margin-top:30px;
                padding:12px 25px;
                font-size:16px;
                background-color:#4CAF50;
                color:white;
                border:none;
                border-radius:6px;
                cursor:pointer;">
                
                Jugar de nuevo
            </button>
        </a>

    </div>

</body>
</html>
